<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Room Type Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f8f9fa;
            margin: 40px;
        }


    .container {
        background: white;
        padding: 25px;
        border-radius: 8px;
        width: 400px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 8px 15px -10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .btn {
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .btn-primary {
        background-color: #007bff;
        color: white;
    }

    .btn-secondary {
        background-color: gray;
        color: white;
    }
	a {
	    text-decoration: none;
	}
</style>


</head>

<body>

<div class="container">


<h2 th:text="${roomType.roomTypeId == null} ? 'Add Room Type' : 'Edit Room Type'"></h2>

<form th:action="@{/roomtypes/save}" th:object="${roomType}" method="post">

    <input type="hidden" th:field="*{roomTypeId}" />
	<label>Name</label>
	    <input type="text" th:field="*{typeName}" required />
    <label>Description</label>
    <input type="text" th:field="*{description}" required />

    <label>Max Occupancy</label>
    <input type="number" th:field="*{maxOccupancy}" required />

    <label>Price Per Night</label>
    <input type="number" step="0.01" th:field="*{pricePerNight}" required />

    <button type="submit" class="btn btn-primary">Save</button>
    <a th:href="@{/roomtypes}" class="btn btn-secondary">Cancel</a>

</form>


</div>

</body>
</html>
