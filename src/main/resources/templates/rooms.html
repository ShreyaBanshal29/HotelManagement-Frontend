<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rooms</title>
	<style>
	       body {
	           font-family: Arial, sans-serif;
	           margin: 40px;
	           background-color: #f8f9fa;
	       }

	       h2 {
	           margin-bottom: 20px;
	       }

	       .container {
	           background: white;
	           padding: 20px;
	           border-radius: 8px;
	           box-shadow: 0 0 10px rgba(0,0,0,0.05);
	       }

	       .btn {
	           padding: 8px 14px;
	           text-decoration: none;
	           border-radius: 4px;
	           font-size: 14px;
	           margin-right: 5px;
	       }

	       .btn-primary {
	           background-color: #007bff;
	           color: white;
	       }

	       .btn-warning {
	           background-color: #ffc107;
	           color: black;
	       }

	       .btn-danger {
	           background-color: #dc3545;
	           color: white;
	       }

	       table {
	           width: 100%;
	           border-collapse: collapse;
	           margin-top: 20px;
	       }

	       th, td {
	           padding: 12px;
	           border-bottom: 1px solid #ddd;
	           text-align: left;
	       }

	       th {
	           background-color: #f1f1f1;
	       }

	       tr:hover {
	           background-color: #f9f9f9;
	       }

	       .top-bar {
	           display: flex;
	           justify-content: space-between;
	           align-items: center;
	       }

	       .pagination {
	           margin-top: 20px;
	       }

	       .pagination a {
	           margin-right: 10px;
	           text-decoration: none;
	           color: #007bff;
	       }
	   </style>
</head>
<body>

	<div class="container">

	    <div class="top-bar">
	        <h2>Rooms</h2>
	    </div>

<table>
	<thead>
    <tr>
        <th>Room Number</th>
        <th>Status</th>
		<th>RoomType</th>
		<th>Hotel Name</th>
		<th>Location</th>
    </tr>
	</thead>
	<tbody>

    <tr th:each="room : ${rooms}">
        <td th:text="${room.roomNumber}"></td>
        <td th:text="${room.isAvailable}"></td>
		<td th:text="${room.roomType != null ? room.roomType.typeName : ''}"></td>
		<td th:text="${room.hotel != null ? room.hotel.name : ''}"></td>
		<td th:text="${room.hotel != null ? room.hotel.location : ''}"></td>
    </tr>
	</tbody>
</table>
<div class="pagination">
    <a th:if="${currentPage > 0}" 
       th:href="@{'' + ${roomTypeId}(page=${currentPage - 1})}">
        Previous
    </a>

    <span th:text="'Page ' + (${currentPage} + 1)"></span>

    <a th:if="${currentPage < totalPages - 1}" 
       th:href="@{'' + ${roomTypeId}(page=${currentPage + 1})}">
        Next
    </a>
</div>
<a href="/roomtypes">Back</a>
	</div>

</body>
</html>
