<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Hotel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #f5f5f5; }
        .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        h1 { font-size: 1.6em; font-weight: 700; color: #111; }
        .back-link { color: #1a73e8; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
        label { font-size: 13px; font-weight: 600; color: #555; }
        input, textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #1a73e8; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { padding: 10px 28px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-save:hover { background: #1558b0; }
        .btn-cancel { padding: 10px 28px; background: #888; color: white; border-radius: 6px; text-decoration: none; font-size: 14px; display: inline-block; }
        .btn-cancel:hover { background: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>Add New Hotel</h1>
        <a th:href="@{/hotels(location=${location})}" class="back-link">← Back to Hotels</a>
    </div>

    <form th:action="@{/hotels/add}" method="post">
        <input type="hidden" name="locationParam" th:value="${location}">

        <div class="form-group">
            <label>Hotel Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Location / City</label>
            <input type="text" name="location" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" required></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Add Hotel</button>
            <a th:href="@{/hotels(location=${location})}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
