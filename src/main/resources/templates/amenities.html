<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Amenities</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f8f9fa;
        }

        h2 {
            margin-bottom: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        .btn {
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 5px;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-warning {
            background-color: #ffc107;
            color: black;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f1f1f1;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
		
		.search-bar {
		    display: flex;
		    margin-top: 15px;
		}

		.search-bar input {
		    flex: 1;
		    padding: 8px;
		    border: 1px solid #ccc;
		    border-right: none;
		    border-radius: 4px 0 0 4px;
		}

		.search-bar button {
		    padding: 8px 14px;
		    border: 1px solid #007bff;
		    background-color: #007bff;
		    color: white;
		    border-radius: 0 4px 4px 0;
		    cursor: pointer;
		}

        .pagination {
            margin-top: 20px;
        }

        .pagination a {
            margin-right: 10px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
		<h2>
		    <a th:href="@{/amenities}" style="text-decoration:none; color:black;">
		        Amenities
		    </a>
		</h2>
        <a th:href="@{/amenities/new}" class="btn btn-primary">+ Add Amenity</a>
    </div>
	
	<form th:action="@{/amenities}" method="get" class="search-bar">
	    <input type="text" name="keyword"
	           th:value="${keyword}"
	           placeholder="Search amenities..." />

	    <button type="submit" class="btn btn-primary">Search</button>
	</form>

	<table>
	    <thead>
	    <tr>
	        <th>Name</th>
	        <th>Description</th>
	        <th>Actions</th>
	    </tr>
	    </thead>

		<tbody th:if="${amenities != null and !#lists.isEmpty(amenities.?[name != null])}">
		    <tr th:each="am : ${amenities}" th:if="${am.name != null}">
		        <td th:text="${am.name}"></td>
		        <td th:text="${am.description}"></td>
		        <td>
		            <a th:href="@{'/amenities/edit/' + ${am.amenityId}}" 
		               class="btn btn-warning">Edit</a>
		        </td>
		    </tr>
		</tbody>
		
		<tbody th:if="${amenities == null or #lists.isEmpty(amenities.?[name != null])}">
		    <tr>
		        <td colspan="3" class="empty">No amenities found</td>
		    </tr>
		</tbody>
	</table>

    <!-- Pagination -->
    <div class="pagination">
        <a th:if="${currentPage > 0}" 
           th:href="@{/amenities(page=${currentPage - 1})}">Previous</a>

        <span th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></span>

        <a th:if="${currentPage < totalPages - 1}" 
           th:href="@{/amenities(page=${currentPage + 1})}">Next</a>
    </div>

</div>

</body>
</html>
