<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Amenities</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { background: #f5f5f5; }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-size: 1.8em;
            font-weight: 700;
            color: #111;
        }

        .btn-add {
            padding: 9px 20px;
            background: #1a73e8;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-add:hover { background: #1558b0; }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            background: #f0f4ff;
            border: 1px solid #d0dbff;
            border-radius: 8px;
            padding: 14px 18px;
            flex-wrap: wrap;
        }

        .search-bar label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .search-bar input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            min-width: 250px;
            flex: 1;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .btn-go {
            padding: 8px 22px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-go:hover { background: #1558b0; }

        table { width: 100%; border-collapse: collapse; }

        thead tr { background: #f0f0f0; }

        th {
            padding: 13px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
        }

        td {
            padding: 13px 16px;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            color: #444;
        }

        tbody tr:hover {
            background: #fafafa;
            cursor: pointer;
        }

        .btn-edit {
            background: #f5a623;
            color: white;
            padding: 6px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .btn-edit:hover { background: #d4891a; }

        .empty-msg {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 15px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .pagination a {
            padding: 6px 10px;
            text-decoration: none;
            color: #1a73e8;
            font-size: 14px;
            border: none;
        }

        .pagination a:hover {
            text-decoration: underline;
        }

        .pagination a.active {
            font-weight: bold;
            color: #111;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="page-header">
        <h1>Amenities</h1>
        <a th:href="@{/amenities/new}" class="btn-add">+ Add Amenity</a>
    </div>

    <!-- Search -->
    <form th:action="@{/amenities}" method="get" class="search-bar">
        <label>Search:</label>
        <input type="text" name="keyword" th:value="${param.keyword}" placeholder="Search amenities...">
        <button type="submit" class="btn-go">Search</button>
    </form>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="am : ${amenities}"
                th:onclick="|window.location='/amenities/' + ${am.amenityId} + '/hotels'|">

                <td th:text="${am.name}" style="color: #1a73e8; font-weight: bold;"></td>
                <td th:text="${am.description}"></td>

                <td onclick="event.stopPropagation()">
                    <a th:href="@{'/amenities/edit/' + ${am.amenityId}}" 
                       class="btn-edit">Edit</a>
                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(amenities)}">
                <td colspan="3" class="empty-msg">No amenities found</td>
            </tr>

        </tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination" th:if="${totalPages > 1}">

        <a th:if="${currentPage > 0}"
           th:href="@{/amenities(page=${currentPage - 1}, keyword=${keyword})}">
           « Prev
        </a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/amenities(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? ' active' : ''">
            </a>
        </span>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/amenities(page=${currentPage + 1}, keyword=${keyword})}">
           Next »
        </a>

    </div>

</div>

</body>
</html>
